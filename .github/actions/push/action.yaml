name: "Push"
description: "Download image artifact, tag, and push to Amazon ECR"

inputs:
  aws_region:
    required: true
  iam_role_arn:
    required: true
  path:
    required: false
    default: /tmp
  file:
    required: false
    default: image.tar
  image:
    required: false
    default: interop-debezium-postgresql:build
  repository:
    required: false
    default: interop-debezium-postgresql

runs:
  using: composite
  steps:
    - name: Download image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image
        path: ${{ inputs.path }}

    - name: Load Docker image
      shell: bash
      env:
        IMAGE_TAR: ${{ inputs.path }}/${{ inputs.file }}
      run: docker load --input "$IMAGE_TAR"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: ${{ inputs.iam_role_arn }}
        role-session-name: interop-debezium-postgresql-${{ github.run_number }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.repository }}
        flavor: |
          latest=false
          prefix=
          suffix=
        tags: |
          type=raw,value=latest,enable=${{ github.ref_type == 'branch' }}
          type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}

    - name: Tag and push Docker image
      shell: bash
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
        SOURCE_IMAGE: ${{ inputs.image }}
      run: |
        for tag in $TAGS; do
          docker tag "$SOURCE_IMAGE" "$tag"
          docker push "$tag"
        done
